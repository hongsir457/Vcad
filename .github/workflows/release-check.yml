name: release-check

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore + build Vcad.Core
        run: dotnet build src/Vcad.Core/Vcad.Core.csproj -c Release

      - name: Restore + build Vcad.AgentLite
        run: dotnet build src/Vcad.AgentLite/Vcad.AgentLite.csproj -c Release

      - name: Run unit tests (Vcad.Core)
        run: dotnet test tests/Vcad.Core.Tests/Vcad.Core.Tests.csproj -c Release --no-build

      - name: Run unit tests (Vcad.AgentLite)
        run: dotnet test tests/Vcad.AgentLite.Tests/Vcad.AgentLite.Tests.csproj -c Release --no-build

      - name: Release check (no Autodesk DLLs, no real keys)
        run: bash tools/check-release.sh .
